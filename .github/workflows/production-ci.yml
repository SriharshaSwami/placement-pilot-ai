name: Production Build & Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Client Dependencies
      run: npm install --prefix client

    - name: Install Server Dependencies
      run: npm install --prefix server

    - name: Security Audit
      run: npm audit --audit-level=moderate
      continue-on-error: true # Let it pass but flag issues

    - name: Lint Client
      run: npm run lint --prefix client
      
    - name: Lint Server
      run: npm run lint --prefix server

    - name: Build Client
      run: npm run build --prefix client

    # We skip actual testing here as the vitest/jest frameworks aren't fully configured yet,
    # but the structure is ready.
